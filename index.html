<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Design Portfolio</title>
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --sidebar-bg: #1a1a1a;
            --accent-color: #007bff;
            --text-main: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--primary-bg);
        }

        /* Sidebar Navigation */
        nav {
            width: 250px;
            background-color: var(--sidebar-bg);
            color: white;
            height: 100vh;
            position: fixed;
            padding: 20px;
        }

        nav h1 { font-size: 1.5rem; margin-bottom: 30px; color: var(--accent-color); }

        nav ul { list-style: none; padding: 0; }

        nav ul li { margin: 15px 0; }

        nav ul li a {
            color: #ccc;
            text-decoration: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        nav ul li a:hover { color: white; padding-left: 5px; }

        /* Main Content Area */
        main {
            margin-left: 290px;
            padding: 40px;
            width: 100%;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .design-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .design-card:hover { transform: translateY(-5px); }

        .placeholder-img {
            width: 100%;
            height: 200px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
        }

        .card-info { padding: 15px; }
        .card-info h3 { margin: 0; font-size: 1.1rem; }
    </style>
</head>
<body>

    <nav>
        <h1>Daniella's Designs</h1>
        <ul>
            <li><a href="#">Show All</a></li>
            <li><hr style="border: 0.5px solid #333;"></li>
            <li><a href="#">01. Costumes </a></li>
            <li><a href="#">02. Weapons Sets</a></li>
            <li><a href="#">03. User Interface Prototypes</a></li>
            <li><a href="#">04. Wings</a></li>
            <li><a href="#">05. Monsters & Bosses</a></li>
            <li><a href="#">06. Logos</a></li>
            <li><a href="#">07. Wallpapers</a></li>

        </ul>
    </nav>

    <main>
        <h2>Recent Works</h2>
        <div class="gallery-grid">
            <div class="design-card">
                <div class="placeholder-img">Project Image</div>
                <div class="card-info">
                    <h3>Project Title</h3>
                    <p style="font-size: 0.8rem; color: #666;">Category Name</p>
                </div>
            </div>
            </div>
    </main>

</body>
</html>
